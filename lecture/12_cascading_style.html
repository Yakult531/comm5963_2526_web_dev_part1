<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cascading Style</title>
</head>
<body>
    <div style="color:blue; border:5px dotted blue">
        (Within blue div)
        <h1>This is H1</h1>
        <h3>This is H3</h3>
        <div style="color:red; border:5px dashed red">
            (Within another div: Override the color to red)
            <h1>This is H1</h1>
            <h3>This is H3</h3>
        </div>
    </div>
</body>
</html>
