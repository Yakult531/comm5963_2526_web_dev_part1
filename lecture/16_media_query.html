<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Viewport and Media Query</title>
    <style>
        table { border: 1px solid black; width: 70% }
        td { border: 1px solid black }
        @media (max-width:320px) {
            table { width: 100% }
        }
    </style>
</head>
<body>
  <table>
      <tr>
          <th>Name</th><th>Age</th>
      </tr>
      <tr>
          <td>Alice</td>
          <td>20</td>
      </tr>
      <tr>
          <td>Bob</td>
          <td>30</td>
      </tr>
      <tr>
          <td>Carl</td>
          <td>40</td>
      </tr>
  </table>
</body>
</html>
