<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Inline Styling</title>
</head>
<body>
    <h1 style="font-style: italic">This text is italic</h1>
    <h3 style="text-align: center">Center</h3>
    <h3 style="text-align: center; color: red">Center and Red</h3>
    <h3 style="text-align: right; color: blue">Right and Blue</h3>
</body>
</html>
