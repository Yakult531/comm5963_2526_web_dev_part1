<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Tailwind Alignment</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="p-6 space-y-6">
  <h1 class="text-4xl font-bold">Tailwind Flexbox</h1>
  <section class="bg-white p-4 rounded shadow space-y-3">
    <h2 class="font-semibold text-2xl">Normal div</h2>
    <div class="border-2 border-green-300 p-4">
      <div class="p-2 bg-green-200 rounded-lg">Item 1</div>
      <div class="p-2 bg-green-200 rounded-lg">Item 2</div>
      <div class="p-2 bg-green-200 rounded-lg">Item 3</div>
    </div>
  </section>

  <section class="bg-white p-4 rounded shadow space-y-3">
    <h2 class="font-semibold text-2xl">flex</h2>
    <div class="border-2 border-blue-200 p-4 flex">
      <div class="p-2 bg-blue-200 rounded-lg">Item 1</div>
      <div class="p-2 bg-blue-200 rounded-lg">Item 2</div>
      <div class="p-2 bg-blue-200 rounded-lg">Item 3</div>
    </div>
  </section>

  <section class="bg-white p-4 rounded shadow space-y-3">
    <h2 class="font-semibold text-2xl">flex justify-end</h2>
    <div class="border-2 border-purple-200 p-4 flex justify-end">
      <div class="p-2 bg-purple-200 rounded-lg">Item 1</div>
      <div class="p-2 bg-purple-200 rounded-lg">Item 2</div>
      <div class="p-2 bg-purple-200 rounded-lg">Item 3</div>
    </div>
  </section>

  <section class="bg-white p-4 rounded shadow space-y-3">
    <h2 class="font-semibold text-2xl">flex justify-center</h2>
    <div class="border-2 border-red-200 p-4 flex justify-center">
      <div class="p-2 bg-red-200 rounded-lg">Item 1</div>
      <div class="p-2 bg-red-200 rounded-lg">Item 2</div>
      <div class="p-2 bg-red-200 rounded-lg">Item 3</div>
    </div>
  </section>

  <section class="bg-white p-4 rounded shadow space-y-3">
    <h2 class="font-semibold text-2xl">flex justify-evenly</h2>
    <div class="border-2 border-amber-500 p-4 flex justify-evenly">
      <div class="p-2 bg-amber-500 rounded-lg">Item 1</div>
      <div class="p-2 bg-amber-500 rounded-lg">Item 2</div>
      <div class="p-2 bg-amber-500 rounded-lg">Item 3</div>
    </div>
  </section>

</body>
</html>
