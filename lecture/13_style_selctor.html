<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Style Selector</title>
    <style>
      div { color:blue }
      p   { color:green }
      a   { color:red }
    </style>
</head>
<body>
    <div>
      <h1>H1 is blue because of div</h1>
      <p>
          Paragraph is green
          <a href="#">but the link is red</a>
      </p>
    </div>
</body>
</html>
