<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Tailwind vs Bootstrap</title>
    <!-- Tailwind via CDN for a quick demo (no build required) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Bootstrap CSS (for comparison only) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100 p-6">
    <!-- Comparison: Tailwind vs Bootstrap cards -->
      <div class="bg-white p-3 rounded-lg shadow">
        <p class="text-2xl font-bold">Tailwind</p>
        <p>Use small components (Utility)</p>
        <a href="#" class="inline-block bg-blue-600 text-white px-3 py-2 rounded hover:bg-blue-700">Button</a>
      </div>
      <div class="card">
        <div class="card-body">
          <p class="h3">Bootstrap</p>
          <p class="card-text">Use big components</p>
          <a href="#" class="btn btn-primary">Button</a>
        </div>
      </div>
</body>
</html>
