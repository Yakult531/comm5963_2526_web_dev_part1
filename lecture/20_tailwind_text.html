<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Tailwind Text</title>
    <!-- Tailwind via CDN for a quick demo (no build required) -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="p-6 space-y-3">
    <div class="bg-white p-3 rounded-lg shadow">
        <h1 class="text-2xl text-green-500 font-semibold mb-2 pb-1 border-b border-gray-200">Size</h1>
        <p class="text-sm">text-sm</p>
        <p class="text-base">text-base (Default)</p>
        <p class="text-lg">text-lg</p>
        <p class="text-xl">text-xl</p>
        <p class="text-2xl">text-2xl</p>
    </div>

    <div class="bg-white p-3 rounded-lg shadow">
        <h1 class="text-2xl text-blue-500 font-semibold  mb-2 pb-1 border-b border-gray-200">Style</h1>
        <p class="font-bold">font-bold</p>
        <p class="italic">italic</p>
        <p class="underline">underline</p>
        <p class="font-bold italic underline">font-bold italic underline</p>
    </div>
</body>
</html>
