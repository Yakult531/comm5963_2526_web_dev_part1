<html lang="en">
<head>

    <title>ID Selector</title>

      p { color: blue }
      #warning { color: red; font-size: xx-large }

</head>
<body>
    <p>Regular paragraph</p>
    <p id="warning">Paragraph with id</p>
    <p>Regular paragraph</p>
</body>
