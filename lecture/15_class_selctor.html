<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Class Selector</title>
    <style>
      .highlight {
          color: orange;
          text-decoration: underline
      }
    </style>
</head>
<body>
    <h1>H1</h1>
    <h1 class="highlight">H1 with highlight</h1>
    <h3>H3</h3>
    <h3 class="highlight">H3 with highlight</h3>
</body>
</html>
