<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Form (POST method)</title>
</head>
<body>
    <h3>Simple Login</h3>
    <!-- This URL displays all POST messages received -->
    <form action="https://httpbin.org/post" method="post">
        Email: <input type="email" name="emailAddress">
        Password: <input type="password" name="pw">
        <input type="submit">
    </form>
</body>
</html>
